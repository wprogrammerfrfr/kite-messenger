  <!-- Wordmark below -->
  <text x="340" y="332" text-anchor="middle" font-family="'Sora', system-ui, sans-serif" font-size="34" font-weight="600" fill="#E6EDF3" letter-spacing="-0.4" style="fill:rgb(230, 237, 243);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Sora, system-ui, sans-serif;font-size:34px;font-weight:600;text-anchor:middle;dominant-baseline:auto">Kite<tspan fill="#FF4500" font-weight="700" style="fill:rgb(255, 69, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Sora, system-ui, sans-serif;font-size:34px;font-weight:700;text-anchor:middle;dominant-baseline:auto">Studio</tspan></text>
