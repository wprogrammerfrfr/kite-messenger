    <rect x="27.5" y="19.4" width="9" height="5.2" rx="2.6" ry="2.6" fill="#1A9E8F" stroke="rgba(255,255,255,0.85)" stroke-width="0.6" style="fill:rgb(26, 158, 143);stroke:rgba(255, 255, 255, 0.85);color:rgb(0, 0, 0);stroke-width:0.6px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <rect x="33.5" y="35.4" width="9" height="5.2" rx="2.6" ry="2.6" fill="#1A9E8F" stroke="rgba(255,255,255,0.85)" stroke-width="0.6" style="fill:rgb(26, 158, 143);stroke:rgba(255, 255, 255, 0.85);color:rgb(0, 0, 0);stroke-width:0.6px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <rect x="39.5" y="27.4" width="9" height="5.2" rx="2.6" ry="2.6" fill="#1A9E8F" stroke="rgba(255,255,255,0.85)" stroke-width="0.6" style="fill:rgb(26, 158, 143);stroke:rgba(255, 255, 255, 0.85);color:rgb(0, 0, 0);stroke-width:0.6px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
